      - Sim
      - Não

  - tag: indicadorAtiva
    label: "Indicação de classe ativa/inativa"
    type: option
    values:
      - Ativa
      - Inativa

  - tag: prazoCorrente
    label: "Prazo na idade corrente"

  - tag: eventoCorrente
    label: "Evento de contagem na idade corrente"

  - tag: prazoIntermediaria
    label: "Prazo na idade intermediária"

  - tag: eventoIntermediaria
    label: "Evento de contagem na idade intermediária"

  - tag: destinacao
    label: "Destinação final"

  - tag: sigilo
    label: "Sigilo associado à classe"

  - tag: observacao
    label: "Observação"

